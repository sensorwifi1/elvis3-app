<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KDS - Bony Kuchenne</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { color: #d4af37; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin: 0;}
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; align-items: start; }
        .ticket { background: #fff9c4; color: #000; padding: 15px; border-radius: 8px; border-top: 10px solid #b71c1c; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .ticket.ready-ticket { border-top-color: #2e7d32; background: #e8f5e9; opacity: 0.9; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #888; padding-bottom: 8px; margin-bottom: 10px; }
        .timer { font-size: 1.4em; font-weight: bold; background: #333; color: white; padding: 4px 8px; border-radius: 5px; }
        .line { border-bottom: 1px dotted #888; padding: 10px 0; }
        .qty { font-weight: bold; background: #000; color: #fff; padding: 3px 10px; border-radius: 4px; margin-right: 8px; }
        .note { color: #b71c1c; font-weight: bold; font-size: 0.9em; background: #ffcdd2; padding: 6px; border-radius: 4px; margin-top: 5px; display: block; }
        .btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn { padding: 15px; border: none; cursor: pointer; font-weight: bold; color: white; flex: 1; border-radius: 6px; text-transform: uppercase; }
        .btn:disabled { background: #999 !important; color: #ddd !important; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🔥 KDS - KUCHNIA 🔥</h1>
    <div id="grid"></div>

    <div id="password-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#111; padding:30px; border-radius:10px; border:2px solid #555; text-align:center; box-shadow:0 0 20px #000; min-width:300px;">
            <h2 style="color:#d4af37; margin-bottom:20px;">Dostęp Chroniony</h2>
            <input type="password" id="access-pwd" style="padding:10px; width:90%; margin-bottom:20px; text-align:center; font-size:1.2em;" placeholder="Podaj Hasło">
            <button onclick="submitPwd()" style="background:#2e7d32; color:white; border:none; padding:12px 20px; font-weight:bold; cursor:pointer; width:100%; border-radius:6px; font-size:1.1em;">ODBLOKUJ KDS</button>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/all_orders');
                const data = await res.json();
                
                // Filtr: tylko kuchnia, nieopłacone i statusy przed wydaniem
                const active = data.orders.filter(o => 
                    (o.to_kitchen === true || o.to_kitchen === "true" || o.to_kitchen === "True") && 
                    ['nowe', 'preparing', 'ready'].includes(o.status) && !o.paid
                );

                const groups = {};
                active.forEach(o => {
                    if (!groups[o.table_number]) groups[o.table_number] = { items: {}, time: o.timestamp || new Date() };
                    const k = o.burger_name + (o.note || "") + o.status;
                    if (!groups[o.table_number].items[k]) {
                        groups[o.table_number].items[k] = { n: o.burger_name, q: 0, note: o.note, status: o.status, ids: [] };
                    }
                    groups[o.table_number].items[k].q++;
                    groups[o.table_number].items[k].ids.push(o.id);
                });

                let html = '';
                const now = new Date();

                for (const [tbl, g] of Object.entries(groups)) {
                    const diff = Math.floor((now - new Date(g.time)) / 1000);
                    const min = Math.floor(diff / 60);
                    const sec = (diff % 60).toString().padStart(2, '0');
                    const allReady = Object.values(g.items).every(i => i.status === 'ready');

                    html += `<div class="ticket ${allReady ? 'ready-ticket' : ''}">
                        <div class="header"><h2>STÓŁ ${tbl}</h2> <div class="timer">${min}:${sec}</div></div>
                        ${Object.values(g.items).map(i => {
                            let btnSmaz = `<button class="btn" style="background:#ff9800" onclick="upd('${i.ids.join(',')}', 'preparing')">SMAŻ</button>`;
                            let btnGotowe = `<button class="btn" disabled style="background:#555">GOTOWE</button>`;
                            
                            if(i.status === 'preparing') { 
                                btnSmaz = `<button class="btn" disabled style="background:#444">🔥 SMAŻY SIĘ</button>`; 
                                btnGotowe = `<button class="btn" style="background:#2e7d32" onclick="upd('${i.ids.join(',')}', 'ready')">GOTOWE</button>`; 
                            } else if(i.status === 'ready') {
                                btnSmaz = `<button class="btn" disabled style="background:#2e7d32">CZEKA NA WYDANIE</button>`;
                                btnGotowe = "";
                            }

                            return `<div class="line">
                                <span class="qty">${i.q}x</span><b>${i.n}</b>
                                ${i.note ? `<span class="note">⚠️ ${i.note}</span>` : ''}
                                <div class="btns">${btnSmaz}${btnGotowe}</div>
                            </div>`;
                        }).join('')}
                    </div>`;
                }
                document.getElementById('grid').innerHTML = html || "<h2 style='text-align:center; width:100%; color:#444; margin-top:50px;'>Kuchnia czysta!</h2>";
            } catch(e) { console.error(e); }
        }

        async function upd(idsStr, s) {
            const ids = idsStr.split(',');
            await Promise.all(ids.map(id => 
                fetch(`/api/update_status/${id}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({status: s})
                })
            ));
            loadData();
        }

        async function checkAccess() {
            const pwd = localStorage.getItem('access_pwd_kds') || '';
            const res = await fetch('/api/auth/verify_password', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({view: 'kds', password: pwd})
            });
            const data = await res.json();
            if(!data.ok) { document.getElementById('password-overlay').style.display = 'flex'; return false; }
            return true;
        }

        async function submitPwd() {
            localStorage.setItem('access_pwd_kds', document.getElementById('access-pwd').value);
            document.getElementById('password-overlay').style.display = 'none';
            if(await checkAccess()) startApp();
            else { alert("Błędne hasło!"); document.getElementById('password-overlay').style.display = 'flex'; }
        }

        async function startApp() {
            if(!(await checkAccess())) return;
            loadData();
            function connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
                ws.onmessage = function(event) {
                    try { const data = JSON.parse(event.data); if (data.type === 'update') loadData(); } catch (e) {}
                };
                ws.onclose = function() { setTimeout(connectWebSocket, 2000); };
            }
            connectWebSocket();
        }
        
        startApp();
    </script>
</body>
</html>
