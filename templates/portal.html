<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>{{ brand }} POS | Portal Pracownika</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; --green: #388e3c; --red: #d32f2f; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #e0e0e0; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow:hidden; }
        
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .logo { color: var(--gold); font-size: 2.5em; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 1.1em; }
        
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        /* PIN Screen */
        #pin-screen { display: block; }
        .pin-display { 
            background: #000; border: 1px solid #333; color: var(--gold); font-size: 2.5em; letter-spacing: 15px; 
            padding: 15px; border-radius: 12px; margin-bottom: 20px; min-height: 70px; display: flex; align-items: center; justify-content: center;
        }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .pin-btn { 
            background: #222; border: none; color: #fff; font-size: 1.8em; padding: 20px; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.1s;
        }
        .pin-btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
        .pin-btn.backspace { background: #333; color: #ff5252; }
        .pin-btn.backspace:active { background: #ff5252; color: #fff; }
        
        #auth-msg { color: var(--red); font-weight: bold; margin-top: 15px; min-height: 20px; }
        
        /* Dashboard Screen */
        #dashboard-screen { display: none; }
        .welcome { font-size: 1.5em; color: var(--gold); margin-bottom: 5px; font-weight: 600; }
        .role-text { color: #888; margin-bottom: 30px; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px;}
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-btn { 
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: #222; border: 1px solid #333; color: #fff; text-decoration: none; padding: 25px; border-radius: 15px; 
            font-size: 1.4em; font-weight: 800; transition: 0.2s;
        }
        .module-btn:hover { transform: translateY(-5px); border-color: var(--gold); }
        .module-btn.waiter { background: linear-gradient(135deg, #1b5e20, #2e7d32); }
        .module-btn.kds { background: linear-gradient(135deg, #0d47a1, #1976d2); }
        .module-btn.wydawka { background: linear-gradient(135deg, #4a148c, #7b1fa2); }
        .module-btn.admin { background: linear-gradient(135deg, #b71c1c, #d32f2f); }
        .module-btn.master { background: linear-gradient(135deg, #e65100, #f57c00); }
        
        .logout-btn { background: transparent; color: #888; border: none; margin-top: 30px; cursor: pointer; font-size: 1em; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">{{ brand }} POS</div>
        <div class="subtitle">Cloud Operations Interface</div>
        
        <div class="card">
            <!-- EKRAN LOGOWANIA -->
            <div id="pin-screen">
                <div class="pin-display" id="pin-display"></div>
                
                <div class="pin-pad">
                    <button class="pin-btn" onclick="addPin(1)">1</button>
                    <button class="pin-btn" onclick="addPin(2)">2</button>
                    <button class="pin-btn" onclick="addPin(3)">3</button>
                    <button class="pin-btn" onclick="addPin(4)">4</button>
                    <button class="pin-btn" onclick="addPin(5)">5</button>
                    <button class="pin-btn" onclick="addPin(6)">6</button>
                    <button class="pin-btn" onclick="addPin(7)">7</button>
                    <button class="pin-btn" onclick="addPin(8)">8</button>
                    <button class="pin-btn" onclick="addPin(9)">9</button>
                    <button class="pin-btn backspace" onclick="delPin()">⌫</button>
                    <button class="pin-btn" onclick="addPin(0)">0</button>
                    <button class="pin-btn" style="background:var(--gold); color:#000;" onclick="submitPin()">OK</button>
                </div>
                <div id="auth-msg"></div>
            </div>

            <!-- EKRAN DASHBOARDU -->
            <div id="dashboard-screen">
                <div class="welcome" id="user-name">Witaj!</div>
                <div class="role-text" id="user-role">Rola</div>
                
                <div class="dashboard-grid" id="modules-container">
                    <!-- Buttons will be injected here via JS -->
                </div>
                
                <button class="logout-btn" onclick="logout()">Wyloguj Się ⎋</button>
            </div>
        </div>
    </div>

    <script>
        let currentPin = "";
        const pinDisplay = document.getElementById("pin-display");
        const msg = document.getElementById("auth-msg");

        function addPin(num) {
            if(currentPin.length < 8) {
                currentPin += num;
                updateDisplay();
                msg.innerText = "";
            }
        }
        function delPin() {
            currentPin = currentPin.slice(0, -1);
            updateDisplay();
            msg.innerText = "";
        }
        function updateDisplay() {
            pinDisplay.innerText = "•".repeat(currentPin.length);
        }

        async function submitPin() {
            if (currentPin.length === 0) return;
            msg.style.color = "var(--gold)";
            msg.innerText = "Weryfikacja...";
            
            try {
                const res = await fetch('/api/auth/staff_login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({pin: currentPin})
                });
                const data = await res.json();
                
                if (data.ok) {
                    localStorage.setItem('staff_pin', currentPin);
                    localStorage.setItem('staff_role', data.role);
                    localStorage.setItem('staff_name', data.name);
                    showDashboard(data.role, data.name);
                } else {
                    msg.style.color = "var(--red)";
                    msg.innerText = "Niepoprawny PIN!";
                    currentPin = "";
                    updateDisplay();
                }
            } catch(e) {
                msg.style.color = "var(--red)";
                msg.innerText = "Błąd komunikacji z serwerem!";
                currentPin = "";
                updateDisplay();
            }
        }

        function showDashboard(role, name) {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            document.getElementById('user-name').innerText = `Witaj, ${name}`;
            document.getElementById('user-role').innerText = role;
            
            const c = document.getElementById("modules-container");
            c.innerHTML = "";
            
            if (['waiter', 'admin', 'master'].includes(role)) {
                c.innerHTML += `<a href="/waiter" class="module-btn waiter">🏃‍♂️ MÓJ POS (KELNER)</a>`;
            }
            if (['kds', 'admin', 'master'].includes(role)) {
                c.innerHTML += `<a href="/kds" class="module-btn kds">👨‍🍳 KUCHNIA (KDS)</a>`;
            }
            if (['wydawka', 'admin', 'master'].includes(role)) {
                c.innerHTML += `<a href="/wydawka" class="module-btn wydawka">📦 WYDAWKA</a>`;
            }
            if (['admin', 'master'].includes(role)) {
                c.innerHTML += `<a href="/admin" class="module-btn admin">⚙️ ADMIN PANEL</a>`;
            }
            if (['master'].includes(role)) {
                c.innerHTML += `<a href="/master" class="module-btn master">👑 MASTER PANEL</a>`;
            }
        }

        function logout() {
            localStorage.removeItem('staff_pin');
            localStorage.removeItem('staff_role');
            localStorage.removeItem('staff_name');
            currentPin = "";
            updateDisplay();
            document.getElementById('pin-screen').style.display = 'block';
            document.getElementById('dashboard-screen').style.display = 'none';
        }

        // Auto-login na podstawie sesji lokalnej
        window.onload = async () => {
            const savedPin = localStorage.getItem('staff_pin');
            if (savedPin) {
                currentPin = savedPin;
                await submitPin();
            }
        };
        
        // Wsparcie obsługi z klawiatury
        document.addEventListener('keydown', (e) => {
            if(document.getElementById('pin-screen').style.display !== 'none') {
                if(e.key >= '0' && e.key <= '9') addPin(e.key);
                if(e.key === 'Backspace') delPin();
                if(e.key === 'Enter') submitPin();
            }
        });
    </script>
</body>
</html>
