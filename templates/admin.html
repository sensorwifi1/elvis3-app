<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>POS Master Admin - zjedz.it</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #111; --green: #388e3c; --orange: #f4511e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden;}
        
        nav { width: 220px; background: #0a0a0a; height: 100vh; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .nav-btn { display: block; width: 100%; padding: 12px; background: none; border: none; color: #888; text-align: left; cursor: pointer; font-size: 1.1em; border-radius: 8px; margin-bottom: 5px;}
        .nav-btn.active { color: #000; font-weight: bold; background: var(--gold); }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .tab.active { display: flex; flex-direction: column; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-card h2 { color: var(--gold); font-size: 1.8em; margin: 5px 0; }
        .stat-card h3 { font-size: 0.85em; color: #888; text-transform: uppercase; margin: 0; }

        .floor-plan { background: #1a1a1a; position: relative; border: 2px dashed #444; border-radius: 15px; min-height: 500px; flex: 1;}
        .table-rect { position: absolute; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; cursor: move; color: #fff; border: 2px solid rgba(0,0,0,0.5); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .t-free { background: var(--green); } .t-open { background: #fbc02d; color: #000; }

        .form-container { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select, textarea { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: sans-serif;}
        textarea { min-height: 80px; resize: vertical; }
        
        button.btn-save { background: var(--gold); color: #000; font-weight: bold; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button.btn-save:hover { opacity: 0.8; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }

        .pos-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pos-table th, .pos-table td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .pos-table th { color: var(--gold); font-size: 0.9em; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #222; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); border: 1px solid var(--gold); font-weight: bold; opacity: 0; transition: 0.3s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div id="toast">Komunikat...</div>

    <nav>
        <h2 style="color:var(--gold); text-align:center; margin-bottom:30px; font-size: 1.2em;">POS ADMIN</h2>
        <button class="nav-btn active" onclick="showTab('tab-dash')">📊 DASHBOARD</button>
        <button class="nav-btn" onclick="showTab('tab-pos')">🔌 POŁĄCZENIE POS</button>
        <button class="nav-btn" onclick="showTab('tab-stats')">📈 STATYSTYKI</button>
        <button class="nav-btn" onclick="showTab('tab-floor')">🗺️ MAPA SALI</button>
        <button class="nav-btn" onclick="showTab('tab-menu')">🍔 PRODUKTY</button>
    </nav>

    <main>
        <div id="tab-dash" class="tab active">
            <div class="stat-grid">
                <div class="stat-card"><h3>Utarg Dzisiaj</h3><h2 id="st-rev">0.00 zł</h2></div>
                <div class="stat-card"><h3>Zamówienia</h3><h2 id="st-qty">0</h2></div>
                <div class="stat-card"><h3>W Kuchni</h3><h2 id="st-kitchen" style="color:var(--orange)">0</h2></div>
                <div class="stat-card"><h3>Gotowe</h3><h2 id="st-ready" style="color:var(--green)">0</h2></div>
            </div>
            <div style="display:flex; gap:20px; flex:1; min-height:0;">
                <div id="floor-dash" class="floor-plan"></div>
                <div class="stat-card" style="flex:0.4; display:flex; flex-direction:column;">
                    <h3>Dzisiejsze Bestsellery</h3>
                    <canvas id="dashChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
        </div>

        <div id="tab-pos" class="tab">
            <h2 style="color:var(--gold);">Status Drukarki Fiskalnej</h2>
            <div class="pos-status">
                <div class="dot online"></div>
                <span>POSNET THERMAL XL2 - <b>POŁĄCZONO</b></span>
            </div>
            <div class="form-container">
                <table class="pos-table" style="width:100%">
                    <thead><tr><th>DATA</th><th>NR RACHUNKU</th><th>KWOTA</th><th>TYP</th><th>STATUS</th></tr></thead>
                    <tbody id="pos-receipts-list"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-stats" class="tab">
            <div class="form-container" style="display:flex; gap:15px; align-items:flex-end;">
                <div style="flex:1;"><label>Od:</label><input type="date" id="stats-from"></div>
                <div style="flex:1;"><label>Do:</label><input type="date" id="stats-to"></div>
                <button class="btn-save" onclick="loadDetailedStats()">POKAŻ RAPORT</button>
            </div>
            <div class="stat-card" style="margin-bottom:20px;">
                <h3>Suma sprzedaży w okresie</h3>
                <h2 id="stats-total-rev">0.00 zł</h2>
            </div>
            <div style="background:#111; padding:20px; border-radius:12px; height:400px;">
                <canvas id="statsChart"></canvas>
            </div>
        </div>

        <div id="tab-floor" class="tab">
            <div class="form-container">
                <div style="display:flex; gap:15px; align-items:center;">
                    Szerokość: <input type="number" id="f-w" style="width:80px;">
                    Wysokość: <input type="number" id="f-h" style="width:80px;">
                    <button onclick="addTable()" style="background:#444; color:#fff; border:none; padding:10px; border-radius:6px; cursor:pointer;">+ DODAJ STOLIK</button>
                    <button class="btn-save" onclick="saveLayout()">💾 ZAPISZ MAPĘ</button>
                </div>
            </div>
            <div id="floor-edit" class="floor-plan"></div>
        </div>

        <div id="tab-menu" class="tab">
            <div class="form-container">
                <h3>Edytor Produktu</h3>
                <div class="input-row">
                    <input type="text" id="m-key" placeholder="Klucz (np. burger_elvis)">
                    <input type="text" id="m-name" placeholder="Nazwa">
                    <input type="number" id="m-price" placeholder="Cena">
                    <input type="number" id="m-sort" value="10">
                </div>
                <div class="input-row" style="grid-template-columns: 2fr 1fr;">
                    <textarea id="m-desc" placeholder="Opis produktu (wyświetlany w menu klienta)"></textarea>
                    <input type="text" id="m-allergens" placeholder="Alergeny (np. gluten, laktoza)">
                </div>
                <div class="input-row">
                    <input type="number" id="m-kcal" placeholder="Kalorie (kcal)">
                    <input type="number" id="m-weight" placeholder="Waga (g)">
                    <select id="m-kitchen">
                        <option value="true">Kuchnia (KDS)</option>
                        <option value="false">Bar (Napoje)</option>
                    </select>
                    <input type="file" id="m-file">
                </div>
                <button class="btn-save" onclick="saveProd()">💾 ZAPISZ I WGRAJ PRODUKT</button>
            </div>
            <div id="prod-grid" class="prod-grid"></div>
        </div>
    </main>

    <script>
        let layout = { width: 10, height: 8, tables: [] };
        let activeTables = []; let allOrders = []; let menuData = {};
        const SCALE = 60; let statsChart = null; let dashChart = null;
        let isEditingMap = false;

        function showToast(msg) {
            const t = document.getElementById("toast"); t.innerText = msg;
            t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000);
        }

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            isEditingMap = (id === 'tab-floor');
            if(id === 'tab-menu') loadMenu();
            if(id === 'tab-floor') drawFloorEdit();
            if(id === 'tab-stats') loadDetailedStats();
            if(id === 'tab-pos') renderPOSList();
        }

        // NAPRAWIONE: Funkcja pobierająca nie tyka mapy, jeśli jest w trakcie edycji!
        async function fetchData() {
            try {
                const [lRes, aRes, oRes] = await Promise.all([
                    fetch('/api/get_layout'), fetch('/api/active_tables'), fetch('/api/all_orders')
                ]);
                
                if (lRes.ok && !isEditingMap) {
                    const newLayout = await lRes.json();
                    layout = newLayout;
                    if(!layout.tables) layout.tables = [];
                    document.getElementById('f-w').value = layout.width || 10;
                    document.getElementById('f-h').value = layout.height || 8;
                    drawFloorDash();
                }
                
                if(aRes.ok) activeTables = (await aRes.json()).tables || [];
                if(oRes.ok) allOrders = (await oRes.json()).orders || [];
                
                updateDashboardStats();
            } catch(e) { console.error("Sync error", e); }
        }

        function drawFloorDash() {
            const f = document.getElementById('floor-dash');
            f.style.width = (layout.width * SCALE) + 'px'; f.style.height = (layout.height * SCALE) + 'px';
            f.innerHTML = '';
            (layout.tables || []).forEach(t => {
                const act = activeTables.find(a => String(a.table_number) === String(t.n));
                const div = document.createElement('div');
                div.className = `table-rect ${act ? 't-open' : 't-free'}`;
                div.style.width = (SCALE-5)+'px'; div.style.height = (SCALE-5)+'px';
                div.style.left = (t.x * SCALE)+'px'; div.style.top = (t.y * SCALE)+'px';
                div.innerText = t.n;
                f.appendChild(div);
            });
        }

        function drawFloorEdit() {
            const f = document.getElementById('floor-edit');
            let w = document.getElementById('f-w').value || 10;
            let h = document.getElementById('f-h').value || 8;
            f.style.width = (w * SCALE) + 'px'; f.style.height = (h * SCALE) + 'px';
            f.innerHTML = '';
            (layout.tables || []).forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'table-rect t-free';
                div.style.width = (SCALE-5)+'px'; div.style.height = (SCALE-5)+'px';
                div.style.left = (t.x * SCALE)+'px'; div.style.top = (t.y * SCALE)+'px';
                div.innerText = t.n;
                div.onmousedown = (e) => {
                    let move = (ev) => {
                        let rect = f.getBoundingClientRect();
                        t.x = Math.max(0, (ev.clientX - rect.left - SCALE/2) / SCALE);
                        t.y = Math.max(0, (ev.clientY - rect.top - SCALE/2) / SCALE);
                        drawFloorEdit();
                    };
                    window.onmousemove = move;
                    window.onmouseup = () => window.onmousemove = null;
                };
                div.ondblclick = () => {
                    let n = prompt("Numer stolika (wpisz USUN by skasować):", t.n);
                    if(n === "USUN") layout.tables.splice(i, 1); else if(n) t.n = n;
                    drawFloorEdit();
                };
                f.appendChild(div);
            });
        }

        function addTable() { 
            if(!layout.tables) layout.tables = [];
            layout.tables.push({n: layout.tables.length + 1, x: 0, y: 0}); 
            drawFloorEdit(); 
        }

        // NAPRAWIONE: Zapis mapy czeka na potwierdzenie od serwera
        // ZNAJDŹ FUNKCJĘ saveLayout() I PODMIEŃ NA TĘ:

        async function saveLayout() {
            // Pobieramy poprawne wymiary, jeśli puste to dajemy 10
            const w = parseInt(document.getElementById('f-w').value) || 10;
            const h = parseInt(document.getElementById('f-h').value) || 10;
            
            const data = {
                width: w,
                height: h,
                tables: layout.tables
            };
            
            try {
                const response = await fetch('/api/admin/save_layout', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // SUKCES: Serwer przyjął mapę
                    showToast("🗺️ Mapa sali ZAPISANA w chmurze!");
                    isEditingMap = false; 
                    fetchData(); // Odświeżamy dane
                } else {
                    // BŁĄD SERWERA (np. 422 lub 500)
                    showToast("❌ Błąd serwera! Mapa NIE zapisana.");
                    console.error("Serwer odrzucił zapis:", await response.text());
                }
            } catch (e) {
                // BŁĄD POŁĄCZENIA
                showToast("❌ Brak połączenia z serwerem!");
            }
        }

        function updateDashboardStats() {
            const today = new Date().toISOString().split('T')[0];
            const tOrders = allOrders.filter(o => o.timestamp && o.timestamp.includes(today));
            const rev = tOrders.reduce((s, o) => s + (parseFloat(o.price) || 0), 0);
            
            document.getElementById('st-rev').innerText = rev.toFixed(2) + " zł";
            document.getElementById('st-qty').innerText = tOrders.length;
            document.getElementById('st-kitchen').innerText = tOrders.filter(o => o.status === 'nowe' || o.status === 'preparing').length;
            document.getElementById('st-ready').innerText = tOrders.filter(o => o.status === 'ready').length;

            const counts = {};
            tOrders.forEach(o => counts[o.burger_name] = (counts[o.burger_name] || 0) + 1);
            const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);

            if(dashChart) dashChart.destroy();
            dashChart = new Chart(document.getElementById('dashChart'), {
                type: 'doughnut',
                data: {
                    labels: sorted.map(x => x[0]),
                    datasets: [{ data: sorted.map(x => x[1]), backgroundColor: ['#d4af37','#fff','#444','#888','#222'], borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: {color:'#fff', font:{size:10}} } } }
            });
        }

        async function saveProd() {
            const fd = new FormData();
            fd.append("key", document.getElementById('m-key').value);
            fd.append("name", document.getElementById('m-name').value);
            fd.append("price", document.getElementById('m-price').value);
            fd.append("sort_order", document.getElementById('m-sort').value);
            fd.append("description", document.getElementById('m-desc').value);
            fd.append("allergens", document.getElementById('m-allergens').value);
            fd.append("kcal", document.getElementById('m-kcal').value);
            fd.append("weight", document.getElementById('m-weight').value);
            fd.append("to_kitchen", document.getElementById('m-kitchen').value === "true");
            
            const file = document.getElementById('m-file').files[0];
            if(file) fd.append("file", file);
            
            await fetch('/api/admin/save_product', { method:'POST', body:fd });
            showToast("🍔 Produkt został pomyślnie zapisany!");
            loadMenu();
        }

        async function loadMenu() {
            const r = await fetch('/api/get_menu');
            menuData = await r.json();
            document.getElementById('prod-grid').innerHTML = Object.entries(menuData).map(([k,v]) => `
                <div class="stat-card" style="padding:10px;">
                    <img src="/static/images/${v.image}" style="width:100%; height:80px; object-fit:cover; border-radius:6px;" onerror="this.src='https://via.placeholder.com/150'">
                    <h4 style="margin:8px 0 4px">${v.name}</h4>
                    <p style="color:var(--gold); margin:0">${v.price} zł</p>
                    <button onclick="editItem('${k}')" style="background:var(--gold); border:none; padding:5px; border-radius:4px; width:100%; cursor:pointer; font-weight:bold; margin-top:8px">EDYTUJ</button>
                </div>
            `).join('');
        }

        function editItem(k) {
            const v = menuData[k];
            document.getElementById('m-key').value = k;
            document.getElementById('m-name').value = v.name || '';
            document.getElementById('m-price').value = v.price || '';
            document.getElementById('m-sort').value = v.sort_order || 10;
            document.getElementById('m-desc').value = v.description || '';
            document.getElementById('m-allergens').value = v.allergens || '';
            document.getElementById('m-kcal').value = v.kcal || '';
            document.getElementById('m-weight').value = v.weight || '';
            document.getElementById('m-kitchen').value = String(v.to_kitchen !== false);
        }

        async function loadDetailedStats() {
            const f = document.getElementById('stats-from').value;
            const t = document.getElementById('stats-to').value;
            if(!f || !t) return;
            const res = await fetch(`/api/admin/stats?start_date=${f}&end_date=${t}`);
            const data = await res.json();
            document.getElementById('stats-total-rev').innerText = data.revenue.toFixed(2) + " zł";
            if(statsChart) statsChart.destroy();
            statsChart = new Chart(document.getElementById('statsChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.products || {}),
                    datasets: [{ label: 'Ilość sprzedanych', data: Object.values(data.products || {}), backgroundColor: '#d4af37' }]
                },
                options: { responsive: true, maintainAspectRatio: false, color: '#fff' }
            });
        }

        function renderPOSList() {
            const list = document.getElementById('pos-receipts-list');
            const paid = allOrders.filter(o => o.paid);
            list.innerHTML = paid.map(o => `
                <tr>
                    <td>${o.timestamp ? o.timestamp.substring(0,16).replace('T',' ') : '---'}</td>
                    <td>#${o.id.substring(0,6).toUpperCase()}</td>
                    <td>${(parseFloat(o.price) || 0).toFixed(2)} zł</td>
                    <td>E-PARAGON</td>
                    <td style="color:#4caf50;">OK</td>
                </tr>
            `).join('') || "<tr><td colspan='5' style='text-align:center;'>Brak paragonów.</td></tr>";
        }

        // Ustaw domyślne daty dla statystyk na dzisiaj/wczoraj
        const dzisiaj = new Date(); const wczoraj = new Date(dzisiaj); wczoraj.setDate(wczoraj.getDate() - 1);
        document.getElementById('stats-from').value = wczoraj.toISOString().split('T')[0];
        document.getElementById('stats-to').value = dzisiaj.toISOString().split('T')[0];

        setInterval(fetchData, 4000);
        fetchData();
    </script>
</body>
</html>
