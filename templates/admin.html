<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>POS Master Admin - zjedz.it</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #111; --green: #388e3c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden;}
        
        nav { width: 220px; background: #0a0a0a; height: 100vh; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .nav-btn { display: block; width: 100%; padding: 12px; background: none; border: none; color: #888; text-align: left; cursor: pointer; font-size: 1.1em; border-radius: 8px; margin-bottom: 5px;}
        .nav-btn.active { color: #000; font-weight: bold; background: var(--gold); }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tab { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .tab.active { display: flex; flex-direction: column; }

        /* POS Connection Style */
        .pos-status { display: flex; align-items: center; gap: 10px; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #666; }
        .dot.online { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .pos-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pos-table th, .pos-table td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .pos-table th { color: var(--gold); font-size: 0.9em; }

        .stat-card { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; flex: 1; }
        .stat-card h2 { color: var(--gold); font-size: 2.2em; margin: 10px 0; }

        .floor-plan { background: #1a1a1a; position: relative; border: 2px dashed #444; border-radius: 15px; min-height: 500px;}
        .table-rect { position: absolute; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; cursor: move; color: #fff; border: 2px solid rgba(0,0,0,0.5); }
        .t-free { background: var(--green); } .t-open { background: #fbc02d; color: #000; }

        .form-container { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select, textarea { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box;}
        
        button.btn-save { background: var(--gold); color: #000; font-weight: bold; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; }
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color:var(--gold); text-align:center; margin-bottom:30px;">POS ADMIN</h2>
        <button class="nav-btn active" onclick="showTab('tab-dash')">📊 DASHBOARD</button>
        <button class="nav-btn" onclick="showTab('tab-pos')">🔌 POŁĄCZENIE POS</button>
        <button class="nav-btn" onclick="showTab('tab-stats')">📈 STATYSTYKI</button>
        <button class="nav-btn" onclick="showTab('tab-floor')">🗺️ MAPA SALI</button>
        <button class="nav-btn" onclick="showTab('tab-menu')">🍔 PRODUKTY</button>
    </nav>

    <main>
        <div id="tab-dash" class="tab active">
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <div class="stat-card"><h3>Utarg Dzisiaj</h3><h2 id="st-rev">0.00 zł</h2></div>
                <div class="stat-card"><h3>Zamówienia dzisiaj</h3><h2 id="st-qty">0</h2></div>
            </div>
            <div id="floor-dash" class="floor-plan"></div>
        </div>

        <div id="tab-pos" class="tab">
            <h2 style="color:var(--gold);">Status Drukarki Fiskalnej</h2>
            <div class="pos-status">
                <div class="dot online"></div>
                <span>POSNET THERMAL XL2 - <b>POŁĄCZONO (USB/TCP)</b></span>
            </div>

            <div class="form-container">
                <h3>Ostatnie Paragony</h3>
                <table class="pos-table">
                    <thead>
                        <tr>
                            <th>DATA/GODZINA</th>
                            <th>NR RACHUNKU</th>
                            <th>KWOTA BRUTTO</th>
                            <th>TYP</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="pos-receipts-list">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-stats" class="tab">
            <div class="form-container" style="display:flex; gap:15px; align-items:flex-end;">
                <div style="flex:1;"><label>Od:</label><input type="date" id="stats-from"></div>
                <div style="flex:1;"><label>Do:</label><input type="date" id="stats-to"></div>
                <button class="btn-save" onclick="loadDetailedStats()">POKAŻ RAPORT</button>
            </div>
            <div class="stat-card" style="margin-bottom:20px;">
                <h3>Suma sprzedaży w okresie</h3>
                <h2 id="stats-total-rev">0.00 zł</h2>
            </div>
            <div style="background:#111; padding:20px; border-radius:12px; height:300px;">
                <canvas id="statsChart"></canvas>
            </div>
        </div>

        <div id="tab-floor" class="tab">
            <div class="form-container">
                <div style="display:flex; gap:15px; align-items:center;">
                    Szer: <input type="number" id="f-w" style="width:70px;">
                    Wys: <input type="number" id="f-h" style="width:70px;">
                    <button onclick="addTable()" style="background:#444; color:#fff; border:none; padding:10px; border-radius:6px; cursor:pointer;">+ DODAJ STOLIK</button>
                    <button class="btn-save" onclick="saveLayout()">💾 ZAPISZ MAPĘ</button>
                </div>
            </div>
            <div id="floor-edit" class="floor-plan"></div>
        </div>

        <div id="tab-menu" class="tab">
            <div class="form-container">
                <h3>Edytor Produktu</h3>
                <div class="input-row">
                    <input type="text" id="m-key" placeholder="Klucz (np. cola)">
                    <input type="text" id="m-name" placeholder="Nazwa">
                    <input type="number" id="m-price" placeholder="Cena">
                    <input type="number" id="m-sort" value="10">
                </div>
                <div class="input-row">
                    <input type="text" id="m-allergens" placeholder="Alergeny">
                    <select id="m-kitchen">
                        <option value="true">Wysyłaj na KDS</option>
                        <option value="false">Bar / Napoje</option>
                    </select>
                    <input type="file" id="m-file">
                </div>
                <button class="btn-save" onclick="saveProd()">💾 ZAPISZ I WGRAJ ZDJĘCIE</button>
            </div>
            <div id="prod-grid" class="prod-grid"></div>
        </div>
    </main>

    <script>
        let layout = { width: 10, height: 8, tables: [] };
        let activeTables = []; let allOrders = []; let menuData = {};
        const SCALE = 60; let statsChart = null;
        let isEditingMap = false;

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            isEditingMap = (id === 'tab-floor');
            if(id === 'tab-menu') loadMenu();
            if(id === 'tab-floor') drawFloorEdit();
            if(id === 'tab-stats') loadDetailedStats();
            if(id === 'tab-pos') renderPOSList();
        }

        async function fetchData() {
            const [l, a, o] = await Promise.all([fetch('/api/get_layout'), fetch('/api/active_tables'), fetch('/api/all_orders')]);
            const newLayout = await l.json();
            activeTables = (await a.json()).tables;
            allOrders = (await o.json()).orders;
            if(!isEditingMap) {
                layout = newLayout;
                document.getElementById('f-w').value = layout.width;
                document.getElementById('f-h').value = layout.height;
                drawFloorDash();
            }
            updateDashboardStats();
        }

        function drawFloorDash() {
            const f = document.getElementById('floor-dash');
            f.style.width = (layout.width * SCALE) + 'px'; f.style.height = (layout.height * SCALE) + 'px';
            f.innerHTML = '';
            layout.tables.forEach(t => {
                const act = activeTables.find(a => a.table_number == t.n);
                const div = document.createElement('div');
                div.className = `table-rect ${act ? 't-open' : 't-free'}`;
                div.style.width = (SCALE-5)+'px'; div.style.height = (SCALE-5)+'px';
                div.style.left = (t.x * SCALE)+'px'; div.style.top = (t.y * SCALE)+'px';
                div.innerText = t.n;
                f.appendChild(div);
            });
        }

        function drawFloorEdit() {
            const f = document.getElementById('floor-edit');
            f.style.width = (document.getElementById('f-w').value * SCALE) + 'px';
            f.style.height = (document.getElementById('f-h').value * SCALE) + 'px';
            f.innerHTML = '';
            layout.tables.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'table-rect t-free';
                div.style.width = (SCALE-5)+'px'; div.style.height = (SCALE-5)+'px';
                div.style.left = (t.x * SCALE)+'px'; div.style.top = (t.y * SCALE)+'px';
                div.innerText = t.n;
                div.onmousedown = (e) => {
                    let move = (ev) => {
                        let rect = f.getBoundingClientRect();
                        t.x = Math.max(0, (ev.clientX - rect.left - SCALE/2) / SCALE);
                        t.y = Math.max(0, (ev.clientY - rect.top - SCALE/2) / SCALE);
                        drawFloorEdit();
                    };
                    window.onmousemove = move;
                    window.onmouseup = () => window.onmousemove = null;
                };
                div.ondblclick = () => {
                    let n = prompt("Numer stolika (USUN by skasować):", t.n);
                    if(n === "USUN") layout.tables.splice(i, 1);
                    else if(n) t.n = n;
                    drawFloorEdit();
                };
                f.appendChild(div);
            });
        }

        function addTable() { layout.tables.push({n: layout.tables.length + 1, x: 0, y: 0}); drawFloorEdit(); }

        async function saveLayout() {
            await fetch('/api/admin/save_layout', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({width: document.getElementById('f-w').value, height: document.getElementById('f-h').value, tables: layout.tables})
            });
            alert("Mapa zapisana!");
            isEditingMap = false;
            fetchData();
        }

        function renderPOSList() {
            const list = document.getElementById('pos-receipts-list');
            const paidOrders = allOrders.filter(o => o.paid);
            list.innerHTML = paidOrders.map(o => `
                <tr>
                    <td>${o.timestamp ? o.timestamp.substring(0,16).replace('T',' ') : '---'}</td>
                    <td>#${o.id.substring(0,6).toUpperCase()}</td>
                    <td>${o.price.toFixed(2)} zł</td>
                    <td>E-PARAGON</td>
                    <td style="color:#4caf50;">FISKALIZACJA OK</td>
                </tr>
            `).join('') || "<tr><td colspan='5' style='text-align:center;'>Brak wystawionych paragonów dzisiaj.</td></tr>";
        }

        function updateDashboardStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayOrders = allOrders.filter(o => o.timestamp && o.timestamp.includes(today));
            const rev = todayOrders.reduce((sum, o) => sum + (parseFloat(o.price) || 0), 0);
            document.getElementById('st-rev').innerText = rev.toFixed(2) + " zł";
            document.getElementById('st-qty').innerText = todayOrders.length;
        }

        async function loadDetailedStats() {
            const from = document.getElementById('stats-from').value;
            const to = document.getElementById('stats-to').value;
            if(!from || !to) return;
            const res = await fetch(`/api/admin/stats?start_date=${from}&end_date=${to}`);
            const data = await res.json();
            document.getElementById('stats-total-rev').innerText = data.revenue.toFixed(2) + " zł";
            if(statsChart) statsChart.destroy();
            statsChart = new Chart(document.getElementById('statsChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.products),
                    datasets: [{ label: 'Sprzedaż szt.', data: Object.values(data.products), backgroundColor: '#d4af37' }]
                },
                options: { responsive: true, maintainAspectRatio: false, color: '#fff' }
            });
        }

        async function saveProd() {
            const fd = new FormData();
            fd.append("key", document.getElementById('m-key').value);
            fd.append("name", document.getElementById('m-name').value);
            fd.append("price", document.getElementById('m-price').value);
            fd.append("sort_order", document.getElementById('m-sort').value);
            fd.append("to_kitchen", document.getElementById('m-kitchen').value === "true");
            
            const fileInput = document.getElementById('m-file');
            if(fileInput.files[0]) {
                fd.append("file", fileInput.files[0]);
            }
            
            await fetch('/api/admin/save_product', { method:'POST', body:fd });
            alert("Produkt zapisany!");
            loadMenu();
        }

        async function loadMenu() {
            const res = await fetch('/api/get_menu');
            menuData = await res.json();
            document.getElementById('prod-grid').innerHTML = Object.entries(menuData).map(([k,v]) => `
                <div class="stat-card" style="padding:10px;">
                    <img src="/static/images/${v.image}" style="width:100%; height:100px; object-fit:cover; border-radius:8px;" onerror="this.src='https://via.placeholder.com/150'">
                    <h4>${v.name}</h4>
                    <p>${v.price} zł</p>
                    <button onclick="editItem('${k}')" style="background:var(--gold); border:none; padding:5px; border-radius:4px; width:100%; cursor:pointer; font-weight:bold;">EDYTUJ</button>
                </div>
            `).join('');
        }

        function editItem(key) {
    const v = menuData[key];
    if(!v) return;

    // Wypełnianie pól formularza
    document.getElementById('m-key').value = key;
    document.getElementById('m-name').value = v.name;
    document.getElementById('m-price').value = v.price;
    document.getElementById('m-sort').value = v.sort_order || 10;
    document.getElementById('m-desc').value = v.description || "";
    document.getElementById('m-allergens').value = v.allergens || "";

    // POPRAWKA KDS: Obsługuje format Boolean (True/False) i String ("true"/"false")
    const isKds = (v.to_kitchen === true || String(v.to_kitchen).toLowerCase() === "true");
    document.getElementById('m-kitchen').value = isKds ? "true" : "false";

    // Przewinięcie do formularza, żeby Elvis widział co edytuje
    document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' });
}
        setInterval(fetchData, 4000);
        fetchData();
    </script>
</body>
</html>
